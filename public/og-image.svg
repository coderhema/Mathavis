<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mathavis cover art</title>
  <desc id="desc">Blue-toned Mathavis banner with typography on the left and a stylized portrait on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="76" y1="36" x2="1136" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BEE6FF"/>
      <stop offset="0.46" stop-color="#8CBFE9"/>
      <stop offset="1" stop-color="#0F2458"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(919 310) rotate(90) scale(195 195)">
